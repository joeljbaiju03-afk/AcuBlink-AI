<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AcuBlink AI - Drowsiness Detection</title>
<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<style>
  :root {
    --bg: #0b0d10;
    --line: #262b33;
    --ok: #5eead4;
    --warn: #ffb020;
    --danger: #ff4d4d;
    --text: #e6e8eb;
    --muted: #8a9099;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
  }
  h1 {
    position: absolute;
    top: 14px; left: 16px;
    z-index: 6;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin: 0;
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
  }
  h1 span { color: var(--ok); }
  #status-pill {
    position: absolute;
    top: 14px; right: 16px;
    z-index: 6;
    font-size: 11px;
    letter-spacing: 0.05em;
    padding: 4px 8px;
    background: rgba(0,0,0,0.55);
    border: 1px solid var(--line);
    border-radius: 3px;
    color: var(--ok);
  }
  #stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    overflow: hidden;
  }
  video, canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  video { transform: scaleX(-1); object-fit: cover; }

  #alertFlash {
    position: fixed;
    inset: 0;
    z-index: 4;
    background: rgba(255,0,0,0.28);
    display: none;
    animation: flash 0.5s infinite;
    pointer-events: none;
  }
  @keyframes flash {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.65; }
  }

  #btn {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 6;
    background: transparent;
    color: var(--ok);
    border: 1px solid #2c6e64;
    padding: 12px 26px;
    border-radius: 3px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }
  #btn:hover { background: rgba(94,234,212,0.08); }

  #bigStatus {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 6;
    padding: 18px 16px calc(20px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    text-align: center;
  }
  #bigStatus .label {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ok);
  }
  #bigStatus.warn .label { color: var(--warn); }
  #bigStatus.danger .label { color: var(--danger); }
  #bigStatus .sub {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  #meterRow {
    max-width: 360px;
    margin: 12px auto 0;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  #meterTrack {
    flex: 1;
    height: 8px;
    background: #21252b;
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  #meterFill {
    height: 100%;
    width: 0%;
    background: var(--ok);
    transition: width 0.1s linear, background 0.2s linear;
  }
  #meterVal, #earVal { font-size: 11px; color: var(--muted); width: 70px; text-align: left; }

  #dismissBtn {
    display: none;
    margin: 12px auto 0;
    background: var(--danger);
    color: #1a0000;
    border: none;
    padding: 10px 24px;
    border-radius: 3px;
    font-family: inherit;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>AcuBlink <span>AI</span></h1>
<div id="status-pill">Loading models…</div>

<div id="stage">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>
</div>

<div id="alertFlash"></div>

<button id="btn">Start Monitoring</button>

<div id="bigStatus" style="display:none">
  <div class="label" id="statusLabel">AWAKE</div>
  <div id="meterRow">
    <div id="meterTrack"><div id="meterFill"></div></div>
    <div id="earVal">EAR: --</div>
  </div>
  <div class="sub">Eyes closed continuously for ~1.5s triggers the alarm. No face in frame for 3s also triggers it.</div>
  <button id="skipCalBtn" style="display:none;margin:10px auto 0;background:transparent;color:var(--muted);border:1px solid var(--line);padding:6px 14px;border-radius:3px;font-family:inherit;font-size:11px;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;">Skip Calibration</button>
  <button id="testAlarmBtn" style="margin:10px 6px 0;background:transparent;color:var(--muted);border:1px solid var(--line);padding:6px 14px;border-radius:3px;font-family:inherit;font-size:11px;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;">Test Alarm Sound</button>
  <button id="dismissBtn">Stop Alarm</button>
</div>

<script>
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const statusPill = document.getElementById('status-pill');
const btn = document.getElementById('btn');
const bigStatus = document.getElementById('bigStatus');
const statusLabel = document.getElementById('statusLabel');
const meterFill = document.getElementById('meterFill');
const earVal = document.getElementById('earVal');
const alertFlash = document.getElementById('alertFlash');
const dismissBtn = document.getElementById('dismissBtn');
const skipCalBtn = document.getElementById('skipCalBtn');
const testAlarmBtn = document.getElementById('testAlarmBtn');

const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
let EAR_CLOSED_THRESHOLD = 0.21;     // fallback until calibrated
const CLOSED_RATIO = 0.75;           // closed = baseline * this ratio
const CALIBRATION_MS = 1500;
const CALIBRATION_MAX_WAIT_MS = 5000; // hard cap, finishes regardless of samples collected
const DROWSY_MS = 1200;               // continuous closure before alarm
const NO_FACE_MS = 3000;             // no face detected before alarm

let running = false;
let closedSince = null;
let noFaceSince = null;
let alarmOn = false;
let audioCtx = null, oscA = null, gainNode = null, alarmTimer = null;
let calibrating = false, calibrationStart = null, calibrationSamples = [];
let lastVideoTime = -1, frozenSince = null;
let earHistory = [];
const EAR_SMOOTHING_WINDOW = 5;

async function loadModels() {
  await Promise.all([
    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
  ]);
}

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  try {
    await video.play();
  } catch (e) {
    console.warn('video.play() rejected, continuing anyway:', e);
  }
  // wait until we actually have a real, decodable frame (not just metadata)
  await new Promise(resolve => {
    if (video.readyState >= 2) return resolve();
    video.addEventListener('loadeddata', resolve, { once: true });
  });
}

function resizeOverlay() {
  overlay.width = video.videoWidth;
  overlay.height = video.videoHeight;
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function eyeAspectRatio(pts) {
  // pts: 6 points per eye, standard 68-landmark eye ordering
  const v1 = dist(pts[1], pts[5]);
  const v2 = dist(pts[2], pts[4]);
  const h = dist(pts[0], pts[3]);
  return (v1 + v2) / (2 * h);
}

// --- Alarm: pulsing dual-tone siren via Web Audio, no external audio file needed ---
function startAlarm() {
  if (alarmOn) return;
  alarmOn = true;
  dismissBtn.style.display = 'inline-block';
  alertFlash.style.display = 'block';
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.5;
  gainNode.connect(audioCtx.destination);

  oscA = audioCtx.createOscillator();
  oscA.type = 'square';
  oscA.frequency.value = 950;
  oscA.connect(gainNode);
  oscA.start();

  let high = true;
  alarmTimer = setInterval(() => {
    high = !high;
    oscA.frequency.setValueAtTime(high ? 950 : 650, audioCtx.currentTime);
  }, 260);
}

function stopAlarm() {
  if (!alarmOn) return;
  alarmOn = false;
  dismissBtn.style.display = 'none';
  alertFlash.style.display = 'none';
  clearInterval(alarmTimer);
  try { oscA.stop(); oscA.disconnect(); gainNode.disconnect(); } catch (e) {}
}

function finishCalibration() {
  const avg = calibrationSamples.length
    ? calibrationSamples.reduce((a,b) => a+b, 0) / calibrationSamples.length
    : 0.28; // reasonable fallback if we never got a clean sample
  EAR_CLOSED_THRESHOLD = avg * CLOSED_RATIO;
  calibrating = false;
  skipCalBtn.style.display = 'none';
  setStatus('ok', 'AWAKE', '');
}

skipCalBtn.addEventListener('click', finishCalibration);

testAlarmBtn.addEventListener('click', async () => {
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  startAlarm();
  setTimeout(stopAlarm, 2000);
});

dismissBtn.addEventListener('click', () => {
  stopAlarm();
  closedSince = null;
  noFaceSince = null;
});

function setStatus(state, label, sub) {
  bigStatus.classList.remove('warn', 'danger');
  if (state === 'warn') bigStatus.classList.add('warn');
  if (state === 'danger') bigStatus.classList.add('danger');
  statusLabel.textContent = label;
  meterFill.style.background = state === 'danger' ? 'var(--danger)' : state === 'warn' ? 'var(--warn)' : 'var(--ok)';
}

async function detectLoop() {
  if (!running) return;
  try {
    // Watchdog: if the video's playback time hasn't moved, we'd be analyzing a stale frame forever.
    const vt = video.currentTime;
    if (vt === lastVideoTime) {
      frozenSince = frozenSince || performance.now();
      if (performance.now() - frozenSince > 2000) {
        statusPill.textContent = 'Video frozen — try reloading the page';
        setStatus('danger', 'CAMERA FROZEN', '');
        requestAnimationFrame(detectLoop);
        return;
      }
    } else {
      frozenSince = null;
      lastVideoTime = vt;
    }

    const ctx = overlay.getContext('2d');
    const opts = new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.5 });
    const result = await faceapi.detectSingleFace(video, opts).withFaceLandmarks();

    ctx.clearRect(0, 0, overlay.width, overlay.height);
    const now = performance.now();

    if (calibrating && now - calibrationStart > CALIBRATION_MAX_WAIT_MS) {
      finishCalibration();
    }

    if (!result) {
      noFaceSince = noFaceSince || now;
      closedSince = null;
      earHistory = [];
      earVal.textContent = 'No face';
      meterFill.style.width = '0%';

      const elapsed = now - noFaceSince;
      if (elapsed > NO_FACE_MS) {
        setStatus('danger', 'NO FACE — WAKE UP!', '');
        startAlarm();
      } else {
        setStatus('warn', 'Face lost…', '');
      }
    } else {
      noFaceSince = null;
      const landmarks = result.landmarks;
      const leftEye = landmarks.getLeftEye();
      const rightEye = landmarks.getRightEye();
      const box = result.detection.box;
      const mirroredX = overlay.width - box.x - box.width;

      ctx.strokeStyle = '#5eead4';
      ctx.lineWidth = 2;
      ctx.strokeRect(mirroredX, box.y, box.width, box.height);

      [leftEye, rightEye].forEach(eye => {
        ctx.fillStyle = '#5eead4';
        eye.forEach(p => {
          const mx = overlay.width - p.x;
          ctx.beginPath();
          ctx.arc(mx, p.y, 2, 0, Math.PI * 2);
          ctx.fill();
        });
      });

      const rawEar = (eyeAspectRatio(leftEye) + eyeAspectRatio(rightEye)) / 2;
      earHistory.push(rawEar);
      if (earHistory.length > EAR_SMOOTHING_WINDOW) earHistory.shift();
      const ear = earHistory.reduce((a,b) => a+b, 0) / earHistory.length;
      earVal.textContent = 'EAR: ' + ear.toFixed(3) + ' / thr ' + EAR_CLOSED_THRESHOLD.toFixed(3);
      const pct = Math.max(0, Math.min(100, (ear / 0.4) * 100));
      meterFill.style.width = pct + '%';

      if (calibrating) {
        calibrationSamples.push(ear);
        const remaining = Math.max(0, CALIBRATION_MS - (now - calibrationStart));
        setStatus('warn', 'Calibrating… keep eyes open', '');
        earVal.textContent = 'EAR: ' + ear.toFixed(3) + ' (' + Math.ceil(remaining/1000) + 's)';
        if (now - calibrationStart > CALIBRATION_MS) {
          finishCalibration();
        }
      } else if (ear < EAR_CLOSED_THRESHOLD) {
        closedSince = closedSince || now;
        const elapsed = now - closedSince;
        if (elapsed > DROWSY_MS) {
          setStatus('danger', 'DROWSY — WAKE UP!', '');
          startAlarm();
        } else {
          setStatus('warn', 'Eyes closing…', '');
        }
      } else {
        closedSince = null;
        if (alarmOn) stopAlarm();
        setStatus('ok', 'AWAKE', '');
      }
    }
  } catch (err) {
    console.error('detectLoop error:', err);
    statusPill.textContent = 'Frame error (recovering): ' + err.message;
  } finally {
    if (running) requestAnimationFrame(detectLoop);
  }
}

btn.addEventListener('click', async () => {
  btn.disabled = true;
  btn.textContent = 'Starting…';
  try {
    // create + resume audio context while we still have the user gesture
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();

    statusPill.textContent = 'Loading models…';
    await loadModels();
    statusPill.textContent = 'Requesting camera…';
    await startCamera();
    resizeOverlay();
    statusPill.textContent = 'Live';
    bigStatus.style.display = 'block';
    btn.style.display = 'none';
    running = true;
    calibrating = true;
    calibrationStart = performance.now();
    calibrationSamples = [];
    earHistory = [];
    skipCalBtn.style.display = 'inline-block';
    setStatus('warn', 'Calibrating… keep eyes open', '');
    detectLoop();
  } catch (err) {
    statusPill.textContent = 'Error: ' + err.message;
    btn.disabled = false;
    btn.textContent = 'Retry';
    console.error(err);
  }
});
</script>
</body>
</html>
